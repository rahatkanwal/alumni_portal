<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#1a5f3f"/>
      <stop offset="100%" stop-color="#0f4a2f"/>
    </linearGradient>
    <radialGradient id="glow2" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <ellipse cx="1150" cy="430" rx="800" ry="600" fill="url(#glow2)"/>

  <!-- Network/connection nodes (alumni network theme) -->
  <g stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" fill="none">
    <line x1="400" y1="300" x2="700" y2="450"/>
    <line x1="700" y1="450" x2="1100" y2="320"/>
    <line x1="1100" y1="320" x2="1450" y2="500"/>
    <line x1="700" y1="450" x2="850" y2="750"/>
    <line x1="850" y1="750" x2="1200" y2="800"/>
    <line x1="1200" y1="800" x2="1450" y2="500"/>
    <line x1="400" y1="300" x2="350" y2="700"/>
    <line x1="350" y1="700" x2="850" y2="750"/>
    <line x1="1450" y1="500" x2="1700" y2="300"/>
    <line x1="1100" y1="320" x2="1700" y2="300"/>
  </g>

  <!-- Network nodes (people) -->
  <g>
    <!-- Node person icons -->
    <g fill="#ffffff" fill-opacity="0.85">
      <circle cx="400" cy="300" r="22"/>
      <circle cx="700" cy="450" r="26"/>
      <circle cx="1100" cy="320" r="24"/>
      <circle cx="1450" cy="500" r="28"/>
      <circle cx="850" cy="750" r="22"/>
      <circle cx="1200" cy="800" r="24"/>
      <circle cx="350" cy="700" r="20"/>
      <circle cx="1700" cy="300" r="22"/>
    </g>
    <!-- Person silhouette inside each circle -->
    <g fill="#1a5f3f">
      <g transform="translate(400 300)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(700 450) scale(1.1)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(1100 320)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(1450 500) scale(1.2)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(850 750)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(1200 800)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(350 700) scale(0.9)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
      <g transform="translate(1700 300)"><circle cx="0" cy="-5" r="6"/><path d="M -10 12 Q -10 2 0 2 Q 10 2 10 12 Z"/></g>
    </g>
    <!-- Pulse animation circles -->
    <g fill="none" stroke="#ffd700" stroke-opacity="0.4">
      <circle cx="700" cy="450" r="40"/>
      <circle cx="1450" cy="500" r="44"/>
    </g>
  </g>

  <!-- Subtle world map dots -->
  <g fill="#ffffff" fill-opacity="0.05">
    <circle cx="200" cy="200" r="3"/><circle cx="280" cy="180" r="3"/><circle cx="160" cy="250" r="3"/>
    <circle cx="1800" cy="850" r="3"/><circle cx="1750" cy="900" r="3"/>
    <circle cx="1850" cy="200" r="3"/>
  </g>

  <!-- Bottom curve -->
  <path d="M0 1080 L0 950 Q 960 870 1920 950 L1920 1080 Z" fill="#000000" fill-opacity="0.25"/>
</svg>
