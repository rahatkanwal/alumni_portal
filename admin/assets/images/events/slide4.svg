<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5f3f"/>
      <stop offset="50%" stop-color="#2d7a5a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#g4)"/>
  <ellipse cx="960" cy="450" rx="900" ry="600" fill="url(#glow4)"/>

  <!-- Open book + light rays (mentorship/knowledge theme) -->
  <g transform="translate(960 480)">
    <!-- Light rays from book -->
    <g stroke="#fbbf24" stroke-opacity="0.25" stroke-width="3">
      <line x1="0" y1="-100" x2="-200" y2="-300"/>
      <line x1="0" y1="-100" x2="0" y2="-320"/>
      <line x1="0" y1="-100" x2="200" y2="-300"/>
      <line x1="0" y1="-100" x2="-300" y2="-200"/>
      <line x1="0" y1="-100" x2="300" y2="-200"/>
      <line x1="0" y1="-100" x2="-380" y2="-50"/>
      <line x1="0" y1="-100" x2="380" y2="-50"/>
    </g>

    <!-- Book base -->
    <path d="M -200 0 Q 0 -40 200 0 L 200 60 Q 0 30 -200 60 Z" fill="#ffffff" fill-opacity="0.95"/>
    <!-- Book pages left -->
    <path d="M -200 0 Q -100 -30 0 -10 L 0 50 Q -100 30 -200 60 Z" fill="#f3f4f6"/>
    <!-- Book pages right -->
    <path d="M 200 0 Q 100 -30 0 -10 L 0 50 Q 100 30 200 60 Z" fill="#f3f4f6"/>
    <!-- Spine -->
    <line x1="0" y1="-10" x2="0" y2="50" stroke="#1a5f3f" stroke-width="2"/>
    <!-- Page lines -->
    <g stroke="#9ca3af" stroke-width="1" stroke-opacity="0.5">
      <line x1="-170" y1="10" x2="-30" y2="2"/>
      <line x1="-170" y1="25" x2="-30" y2="18"/>
      <line x1="-170" y1="40" x2="-30" y2="35"/>
      <line x1="30" y1="2" x2="170" y2="10"/>
      <line x1="30" y1="18" x2="170" y2="25"/>
      <line x1="30" y1="35" x2="170" y2="40"/>
    </g>
  </g>

  <!-- Mentorship handshake icon (left) -->
  <g transform="translate(450 480)" fill="#ffffff" fill-opacity="0.18">
    <circle cx="0" cy="0" r="80"/>
    <path d="M -35 -10 Q -35 -25 -20 -25 L 20 -25 Q 35 -25 35 -10 L 35 10 Q 35 25 20 25 L -20 25 Q -35 25 -35 10 Z" fill="#1a5f3f"/>
    <circle cx="-15" cy="0" r="8" fill="#ffffff"/>
    <circle cx="15" cy="0" r="8" fill="#ffffff"/>
  </g>

  <!-- Heart icon (give back, right) -->
  <g transform="translate(1470 480)" fill="#ffffff" fill-opacity="0.18">
    <circle cx="0" cy="0" r="80"/>
    <path d="M 0 25 C -30 0 -45 -15 -45 -25 C -45 -35 -35 -42 -25 -42 C -15 -42 -5 -35 0 -25 C 5 -35 15 -42 25 -42 C 35 -42 45 -35 45 -25 C 45 -15 30 0 0 25 Z" fill="#fbbf24"/>
  </g>

  <!-- Lightbulb (inspire, top) -->
  <g transform="translate(960 200)" fill="#fbbf24" fill-opacity="0.4">
    <circle cx="0" cy="0" r="35"/>
    <rect x="-8" y="20" width="16" height="10" fill="#ffffff" fill-opacity="0.6"/>
    <g stroke="#fbbf24" stroke-opacity="0.6" stroke-width="3">
      <line x1="0" y1="-60" x2="0" y2="-50"/>
      <line x1="-50" y1="0" x2="-60" y2="0"/>
      <line x1="50" y1="0" x2="60" y2="0"/>
      <line x1="-40" y1="-40" x2="-48" y2="-48"/>
      <line x1="40" y1="-40" x2="48" y2="-48"/>
    </g>
  </g>

  <!-- Connecting lines -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="8 8">
    <path d="M 450 480 Q 700 350 960 480" fill="none"/>
    <path d="M 960 480 Q 1220 350 1470 480" fill="none"/>
    <path d="M 960 200 Q 960 350 960 480" fill="none"/>
  </g>

  <!-- Decorative dots -->
  <g fill="#ffffff" fill-opacity="0.18">
    <circle cx="150" cy="200" r="4"/>
    <circle cx="200" cy="250" r="3"/>
    <circle cx="1700" cy="200" r="4"/>
    <circle cx="1750" cy="250" r="3"/>
    <circle cx="300" cy="850" r="3"/>
    <circle cx="1620" cy="850" r="3"/>
  </g>

  <!-- Bottom curve -->
  <path d="M0 1080 L0 950 Q 960 870 1920 950 L1920 1080 Z" fill="#000000" fill-opacity="0.2"/>
</svg>
